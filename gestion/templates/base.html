<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión Escolar{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary bg-gradient mb-4 shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="{% url 'dashboard' %}">
                <i class="bi bi-mortarboard-fill me-2"></i>Sistema Escolar
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="topNavbar">
                <div class="navbar-nav ms-auto d-flex align-items-center">
                    <a href="{% url 'mis_notificaciones' %}" class="nav-link text-white position-relative me-4" title="Notificaciones">
                        <i class="bi bi-bell-fill fs-5"></i>
                        {% if unread_notifications_count > 0 %}
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light mt-2" style="font-size: 0.70em;">
                            {{ unread_notifications_count }}
                        </span>
                        {% endif %}
                    </a>
                    
                    <div class="d-flex align-items-center bg-white bg-opacity-10 rounded-pill px-3 py-1 me-3">
                        <i class="bi bi-person-circle text-white fs-5 me-2"></i>
                        <span class="text-white fw-medium">{{ user.username }}</span>
                    </div>
                    
                    <form action="{% url 'logout' %}" method="post" class="d-inline m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-light btn-sm fw-bold text-primary rounded-pill px-3">
                            <i class="bi bi-box-arrow-right me-1"></i>Salir
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mb-3">
        {% block back_button %}
        {% endblock %}
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        {% if messages %}
            {% for message in messages %}
                {% if "force_comision" in message.tags or "force_mesa" in message.tags %}
                    Swal.fire({
                        icon: 'warning',
                        title: 'Atención',
                        text: '{{ message|escapejs }}',
                        showCancelButton: true,
                        confirmButtonText: 'Inscribir de todos modos',
                        cancelButtonText: 'Entendido',
                        confirmButtonColor: '#d33',
                        cancelButtonColor: '#3085d6'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            const tagsStr = "{{ message.tags }}";
                            const tags = tagsStr.split(' ');
                            let forceTag = tags.find(t => t.startsWith('force_comision') || t.startsWith('force_mesa'));
                            
                            if (forceTag) {
                                let parts = forceTag.split(',');
                                let type = parts[0];
                                let targetId = parts[1];
                                let alumnoId = parts[2];
                                
                                let form = document.createElement('form');
                                form.method = 'POST';
                                
                                if (type === 'force_comision') {
                                    form.action = '/comisiones/' + targetId + '/inscribir/';
                                    let alumInput = document.createElement('input');
                                    alumInput.type = 'hidden';
                                    alumInput.name = 'alumnos_ids';
                                    alumInput.value = alumnoId;
                                    form.appendChild(alumInput);
                                } else if (type === 'force_mesa') {
                                    form.action = '/mesas/' + targetId + '/inscribir/';
                                    let alumInput = document.createElement('input');
                                    alumInput.type = 'hidden';
                                    alumInput.name = 'alumno';
                                    alumInput.value = alumnoId;
                                    form.appendChild(alumInput);
                                }
                                
                                let csrf = document.createElement('input');
                                csrf.type = 'hidden';
                                csrf.name = 'csrfmiddlewaretoken';
                                csrf.value = '{{ csrf_token }}';
                                form.appendChild(csrf);
                                
                                let forceInput = document.createElement('input');
                                forceInput.type = 'hidden';
                                forceInput.name = 'force';
                                forceInput.value = 'true';
                                form.appendChild(forceInput);
                                
                                document.body.appendChild(form);
                                form.submit();
                            }
                        }
                    });
                {% else %}
                    Swal.fire({
                        icon: '{% if "error" in message.tags %}error{% elif "warning" in message.tags %}warning{% elif "success" in message.tags %}success{% else %}info{% endif %}',
                        title: '{% if "error" in message.tags %}Error{% elif "warning" in message.tags %}Atención{% elif "success" in message.tags %}¡Éxito!{% else %}Información{% endif %}',
                        text: '{{ message|escapejs }}',
                        confirmButtonText: 'Entendido',
                        confirmButtonColor: '#3085d6'
                    });
                {% endif %}
            {% endfor %}
        {% endif %}
    </script>
</body>
</html>
