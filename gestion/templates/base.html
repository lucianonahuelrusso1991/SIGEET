<!DOCTYPE html>
{% load static %}
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión Escolar - Pío IX{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            /* Colores Institucionales Don Bosco Pío IX */
            --bs-primary: #1F4A75;
            --bs-primary-rgb: 31, 74, 117;
            --bs-secondary: #289EA0;
            --bs-secondary-rgb: 40, 158, 160;
            --bs-info: #289EA0;
            --bs-info-rgb: 40, 158, 160;
            --bg-color: #F8FAFC;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        
        .bg-primary { background-color: var(--bs-primary) !important; }
        .text-primary { color: var(--bs-primary) !important; }
        .border-primary { border-color: var(--bs-primary) !important; }
        .btn-primary { 
            background-color: var(--bs-primary); 
            border-color: var(--bs-primary); 
            color: #fff;
        }
        .btn-primary:hover { 
            background-color: #173859; 
            border-color: #173859; 
            color: #fff;
        }
        .btn-outline-primary {
            color: var(--bs-primary);
            border-color: var(--bs-primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--bs-primary);
            color: #fff;
        }
        
        .bg-info { background-color: var(--bs-secondary) !important; }
        .text-info { color: var(--bs-secondary) !important; }
        .btn-info { background-color: var(--bs-secondary); border-color: var(--bs-secondary); color: #fff; }
        .btn-info:hover { background-color: #1D797A; border-color: #1D797A; color: #fff; }
        
        .navbar-brand img {
            max-height: 55px;
            object-fit: contain;
        }
        .navbar-custom {
            border-bottom: 4px solid var(--bs-secondary);
        }
        .hover-lift:hover {
            transform: translateY(-3px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important;
        }
        .theme-icon-active {
            display: inline-block;
            transition: transform 0.2s;
        }

        /* Animación de entrada suave */
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Badges modernos y suaves */
        .badge-soft-primary {
            background-color: rgba(40, 158, 160, 0.15);
            color: var(--bs-primary);
            font-weight: 600;
        }
    </style>
    <script>
        // Aplicar el tema lo antes posible para evitar parpadeos
        const storedTheme = localStorage.getItem('theme');
        const getPreferredTheme = () => {
            if (storedTheme) {
                return storedTheme;
            }
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-bs-theme', getPreferredTheme());
    </script>
</head>
<body class="bg-body">

    <nav class="navbar navbar-expand-lg bg-body-tertiary navbar-custom mb-4 shadow-sm py-2">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'dashboard' %}">
                <!-- Por defecto intenta cargar el logo local, si no lo encuentra usa uno temporal hasta que subas el real -->
                <img id="main-logo" src="{% static 'img/logo.png' %}" 
                     data-light-src="{% static 'img/logo.png' %}" 
                     data-dark-src="{% static 'img/logo2.png' %}" 
                     alt="Profesorado Don Bosco Pío IX" 
                     onerror="this.src='https://placehold.co/300x80/ffffff/1F4A75?text=Profesorado+Don+Bosco&font=montserrat'">
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#topNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="topNavbar">
                <div class="navbar-nav ms-auto d-flex flex-column flex-lg-row align-items-lg-center mt-3 mt-lg-0 gap-3">
                    <a href="{% url 'mis_notificaciones' %}" class="btn btn-outline-primary btn-sm fw-bold rounded-pill px-4 py-2 position-relative d-flex align-items-center justify-content-center">
                        <i class="bi bi-envelope-fill me-2"></i>Bandeja de Entrada
                        {% if unread_notifications_count > 0 %}
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light">
                            {{ unread_notifications_count }}
                        </span>
                        {% endif %}
                    </a>
                    
                    <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 py-2 d-flex align-items-center justify-content-center" id="theme-toggle" title="Cambiar tema">
                        <i class="bi bi-moon-stars-fill theme-icon-active"></i>
                    </button>
                    
                    <div class="d-flex align-items-center bg-body-secondary border border-secondary border-opacity-25 rounded-pill px-3 py-2 justify-content-center text-body">
                        <i class="bi bi-person-circle fs-5 me-2 text-primary"></i>
                        <span class="fw-medium">{{ user.username }}</span>
                    </div>
                    
                    <form action="{% url 'logout' %}" method="post" class="d-flex justify-content-center m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm fw-bold rounded-pill px-4 py-2 w-100 w-lg-auto">
                            <i class="bi bi-box-arrow-right me-1"></i>Salir
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mb-3">
        {% block back_button %}
        {% endblock %}
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('theme-toggle');
            const icon = toggleBtn.querySelector('i');
            const logoImg = document.getElementById('main-logo');
            
            const updateThemeUI = (theme) => {
                if (theme === 'dark') {
                    icon.classList.remove('bi-moon-stars-fill');
                    icon.classList.add('bi-sun-fill');
                    icon.classList.add('text-warning');
                    if (logoImg) logoImg.src = logoImg.getAttribute('data-dark-src');
                } else {
                    icon.classList.remove('bi-sun-fill');
                    icon.classList.remove('text-warning');
                    icon.classList.add('bi-moon-stars-fill');
                    if (logoImg) logoImg.src = logoImg.getAttribute('data-light-src');
                }
            }

            // Set initial icon and logo
            updateThemeUI(document.documentElement.getAttribute('data-bs-theme'));

            toggleBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-bs-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                document.documentElement.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeUI(newTheme);
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        {% if messages %}
            {% for message in messages %}
                {% if "force_comision" in message.tags or "force_mesa" in message.tags %}
                    Swal.fire({
                        icon: 'warning',
                        title: 'Atención',
                        text: '{{ message|escapejs }}',
                        showCancelButton: true,
                        confirmButtonText: 'Inscribir de todos modos',
                        cancelButtonText: 'Entendido',
                        confirmButtonColor: '#d33',
                        cancelButtonColor: '#3085d6'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            const tagsStr = "{{ message.tags }}";
                            const tags = tagsStr.split(' ');
                            let forceTag = tags.find(t => t.startsWith('force_comision') || t.startsWith('force_mesa'));
                            
                            if (forceTag) {
                                let parts = forceTag.split(',');
                                let type = parts[0];
                                let targetId = parts[1];
                                let alumnoId = parts[2];
                                
                                let form = document.createElement('form');
                                form.method = 'POST';
                                
                                if (type === 'force_comision') {
                                    form.action = '/comisiones/' + targetId + '/inscribir/';
                                    let alumInput = document.createElement('input');
                                    alumInput.type = 'hidden';
                                    alumInput.name = 'alumnos_ids';
                                    alumInput.value = alumnoId;
                                    form.appendChild(alumInput);
                                } else if (type === 'force_mesa') {
                                    form.action = '/mesas/' + targetId + '/inscribir/';
                                    let alumInput = document.createElement('input');
                                    alumInput.type = 'hidden';
                                    alumInput.name = 'alumno';
                                    alumInput.value = alumnoId;
                                    form.appendChild(alumInput);
                                }
                                
                                let csrf = document.createElement('input');
                                csrf.type = 'hidden';
                                csrf.name = 'csrfmiddlewaretoken';
                                csrf.value = '{{ csrf_token }}';
                                form.appendChild(csrf);
                                
                                let forceInput = document.createElement('input');
                                forceInput.type = 'hidden';
                                forceInput.name = 'force';
                                forceInput.value = 'true';
                                form.appendChild(forceInput);
                                
                                document.body.appendChild(form);
                                form.submit();
                            }
                        }
                    });
                {% else %}
                    Swal.fire({
                        icon: '{% if "error" in message.tags %}error{% elif "warning" in message.tags %}warning{% elif "success" in message.tags %}success{% else %}info{% endif %}',
                        title: '{% if "error" in message.tags %}Error{% elif "warning" in message.tags %}Atención{% elif "success" in message.tags %}¡Éxito!{% else %}Información{% endif %}',
                        text: '{{ message|escapejs }}',
                        confirmButtonText: 'Entendido',
                        confirmButtonColor: '#3085d6'
                    });
                {% endif %}
            {% endfor %}
        {% endif %}
    </script>
</body>
</html>
