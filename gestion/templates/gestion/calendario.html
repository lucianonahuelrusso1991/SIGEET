{% extends "base.html" %}

{% block title %}Calendario Institucional{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-11">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="text-primary fw-bold mb-0">📅 Calendario Institucional</h2>
                <p class="text-muted">Horarios de clases, feriados y eventos especiales</p>
            </div>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-warning shadow-sm fw-bold" data-bs-toggle="modal" data-bs-target="#modalNuevoEvento">
                    + Añadir Evento o Feriado
                </button>
                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary shadow-sm fw-bold">⬅ Ir al Panel</a>
            </div>
        </div>
        
        <div class="card shadow-sm border-0 mb-4 bg-light">
            <div class="card-body py-2">
                <div class="d-flex align-items-center">
                    <label class="fw-bold me-3 text-secondary"><i class="bi bi-funnel"></i> Filtrar por Carrera:</label>
                    <select id="filtroPlan" class="form-select shadow-sm" style="max-width: 400px;">
                        <option value="todos">Todas las Carreras (Ver todo)</option>
                        {% for plan in planes %}
                            <option value="{{ plan.id }}">{{ plan.nombre }}</option>
                        {% endfor %}
                        <option value="eventos_solo">Solo Feriados y Eventos (Ocultar clases)</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="card shadow-sm border-0 mb-5">
            <div class="card-body p-4">
                <div id="calendario"></div>
            </div>
        </div>
        
    </div>
</div>

<!-- Modal Añadir Evento -->
<div class="modal fade" id="modalNuevoEvento" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title fw-bold">Nuevo Evento Institucional</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formNuevoEvento">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Título del Evento</label>
                        <input type="text" class="form-control" name="titulo" required placeholder="Ej: Feriado Nacional...">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tipo</label>
                        <select class="form-select" name="tipo">
                            <option value="FERIADO">Feriado Nacional / Provincial (Rojo)</option>
                            <option value="EVENTO" selected>Evento Institucional (Azul)</option>
                            <option value="EXAMEN">Semana de Exámenes (Amarillo)</option>
                        </select>
                    </div>
                    
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" name="todo_el_dia" id="todoElDia" checked>
                        <label class="form-check-label fw-bold" for="todoElDia">Ocupa todo el día</label>
                    </div>
                    
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Fecha (Inicio)</label>
                            <input type="datetime-local" class="form-control" name="fecha_inicio" id="fechaInicio" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Fecha Fin (Opcional)</label>
                            <input type="datetime-local" class="form-control" name="fecha_fin" id="fechaFin">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción (Opcional)</label>
                        <textarea class="form-control" name="descripcion" rows="2"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-warning w-100 fw-bold">Guardar Evento</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Scripts de FullCalendar -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendario');
        var filtroPlan = document.getElementById('filtroPlan');
        var checkboxTodoElDia = document.getElementById('todoElDia');
        var inputFechaInicio = document.getElementById('fechaInicio');
        var inputFechaFin = document.getElementById('fechaFin');
        
        // Ajustar el tipo de input según "Todo el día"
        checkboxTodoElDia.addEventListener('change', function() {
            var type = this.checked ? 'date' : 'datetime-local';
            inputFechaInicio.type = type;
            inputFechaFin.type = type;
        });
        
        // Forzar disparar el evento para inicializar
        checkboxTodoElDia.dispatchEvent(new Event('change'));
        
        var eventos = JSON.parse('{{ eventos_json|escapejs }}');
        
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            locale: 'es',
            slotMinTime: '08:00:00', // Ampliado para cubrir eventos tempranos
            slotMaxTime: '23:30:00',
            allDaySlot: true, // Habilitado para feriados
            hiddenDays: [0], // Ocultar domingo
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            buttonText: {
                today: 'Hoy',
                month: 'Mes',
                week: 'Semana',
                day: 'Día'
            },
            events: eventos,
            eventClick: function(info) {
                if (info.event.url) {
                    window.location.href = info.event.url;
                    info.jsEvent.preventDefault();
                } else if (info.event.extendedProps.descripcion) {
                    Swal.fire({
                        title: info.event.title,
                        text: info.event.extendedProps.descripcion,
                        icon: 'info'
                    });
                }
            },
            eventDidMount: function(info) {
                var planSeleccionado = filtroPlan.value;
                var props = info.event.extendedProps;
                
                // Lógica de filtrado
                var mostrar = true;
                
                if (planSeleccionado === 'eventos_solo') {
                    if (props.tipo === 'CLASE' || props.tipo === 'MESA_EXAMEN') mostrar = false;
                } else if (planSeleccionado !== 'todos') {
                    // Si es una clase o mesa, debe coincidir el plan
                    if ((props.tipo === 'CLASE' || props.tipo === 'MESA_EXAMEN') && props.plan_id != planSeleccionado) {
                        mostrar = false;
                    }
                    // Si es feriado/evento se muestra siempre
                }
                
                if (!mostrar) {
                    info.el.style.display = 'none';
                } else {
                    info.el.style.display = '';
                }
            }
        });
        
        calendar.render();
        
        // Re-renderizar al cambiar el filtro
        filtroPlan.addEventListener('change', function() {
            var currentEvents = calendar.getEvents();
            // Truco para forzar re-evaluacion visual
            calendar.changeView(calendar.view.type);
        });
        
        // AJAX Formulario
        var form = document.getElementById('formNuevoEvento');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            var formData = new FormData(form);
            
            fetch("{% url 'alta_evento_calendario' %}", {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': formData.get('csrfmiddlewaretoken')
                }
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    Swal.fire('Éxito', data.msg, 'success').then(() => {
                        window.location.reload();
                    });
                } else {
                    Swal.fire('Error', data.error, 'error');
                }
            })
            .catch(err => {
                Swal.fire('Error', 'Ocurrió un error inesperado.', 'error');
            });
        });
    });
</script>
{% endblock %}
