{% extends "base.html" %}

{% block back_button %}
<a href="{% url 'legajo_alumno' alumno.id %}" class="btn btn-sm btn-outline-secondary shadow-sm fw-bold">⬅ Volver al legajo del alumno</a>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <form method="post" class="card shadow-sm border-0 mb-5">
            {% csrf_token %}
            <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center py-3">
                <h4 class="mb-0 fw-bold">✏️ Editar Datos de: {{ alumno.nombre }} {{ alumno.apellido }}</h4>
            </div>
            
            <div class="card-body p-4">
            <div class="card-body p-4">
                <h5 class="text-warning border-bottom pb-2 mb-3">1. Datos Personales y Demográficos</h5>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Nombre/s *</label>
                        <input type="text" name="nombre" class="form-control" value="{{ alumno.nombre }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Apellido/s *</label>
                        <input type="text" name="apellido" class="form-control" value="{{ alumno.apellido }}" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Correo Electrónico (Será su Usuario) *</label>
                        <input type="email" name="email" class="form-control" value="{% if alumno.email %}{{ alumno.email }}{% endif %}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-muted small fw-bold">Teléfono Fijo</label>
                        <input type="text" name="telefono" class="form-control" value="{% if alumno.telefono %}{{ alumno.telefono }}{% endif %}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-muted small fw-bold">Celular *</label>
                        <input type="text" name="celular" class="form-control" value="{% if alumno.celular %}{{ alumno.celular }}{% endif %}" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">DNI *</label>
                        <input type="text" name="dni" class="form-control" value="{{ alumno.dni }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Nacionalidad</label>
                        <input type="text" name="nacionalidad" class="form-control" value="{{ alumno.nacionalidad|default:'Argentina' }}">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-12">
                        <label class="form-label text-muted small fw-bold">Domicilio *</label>
                        <input type="text" name="direccion" class="form-control" value="{{ alumno.direccion }}" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Código Postal</label>
                        <input type="text" name="codigo_postal" class="form-control" value="{{ alumno.codigo_postal|default:'' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Comuna o zona</label>
                        <input type="text" name="comuna_zona" class="form-control" value="{{ alumno.comuna_zona|default:'' }}">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Provincia</label>
                        <select name="provincia" class="form-select">
                            <option value="">Seleccione...</option>
                            <option value="Buenos Aires" {% if alumno.provincia == 'Buenos Aires' %}selected{% endif %}>Buenos Aires</option>
                            <option value="CABA" {% if alumno.provincia == 'CABA' %}selected{% endif %}>Ciudad Autónoma de Buenos Aires</option>
                            <option value="Catamarca" {% if alumno.provincia == 'Catamarca' %}selected{% endif %}>Catamarca</option>
                            <option value="Chaco" {% if alumno.provincia == 'Chaco' %}selected{% endif %}>Chaco</option>
                            <option value="Chubut" {% if alumno.provincia == 'Chubut' %}selected{% endif %}>Chubut</option>
                            <option value="Córdoba" {% if alumno.provincia == 'Córdoba' %}selected{% endif %}>Córdoba</option>
                            <option value="Corrientes" {% if alumno.provincia == 'Corrientes' %}selected{% endif %}>Corrientes</option>
                            <option value="Entre Ríos" {% if alumno.provincia == 'Entre Ríos' %}selected{% endif %}>Entre Ríos</option>
                            <option value="Formosa" {% if alumno.provincia == 'Formosa' %}selected{% endif %}>Formosa</option>
                            <option value="Jujuy" {% if alumno.provincia == 'Jujuy' %}selected{% endif %}>Jujuy</option>
                            <option value="La Pampa" {% if alumno.provincia == 'La Pampa' %}selected{% endif %}>La Pampa</option>
                            <option value="La Rioja" {% if alumno.provincia == 'La Rioja' %}selected{% endif %}>La Rioja</option>
                            <option value="Mendoza" {% if alumno.provincia == 'Mendoza' %}selected{% endif %}>Mendoza</option>
                            <option value="Misiones" {% if alumno.provincia == 'Misiones' %}selected{% endif %}>Misiones</option>
                            <option value="Neuquén" {% if alumno.provincia == 'Neuquén' %}selected{% endif %}>Neuquén</option>
                            <option value="Río Negro" {% if alumno.provincia == 'Río Negro' %}selected{% endif %}>Río Negro</option>
                            <option value="Salta" {% if alumno.provincia == 'Salta' %}selected{% endif %}>Salta</option>
                            <option value="San Juan" {% if alumno.provincia == 'San Juan' %}selected{% endif %}>San Juan</option>
                            <option value="San Luis" {% if alumno.provincia == 'San Luis' %}selected{% endif %}>San Luis</option>
                            <option value="Santa Cruz" {% if alumno.provincia == 'Santa Cruz' %}selected{% endif %}>Santa Cruz</option>
                            <option value="Santa Fe" {% if alumno.provincia == 'Santa Fe' %}selected{% endif %}>Santa Fe</option>
                            <option value="Santiago del Estero" {% if alumno.provincia == 'Santiago del Estero' %}selected{% endif %}>Santiago del Estero</option>
                            <option value="Tierra del Fuego" {% if alumno.provincia == 'Tierra del Fuego' %}selected{% endif %}>Tierra del Fuego</option>
                            <option value="Tucumán" {% if alumno.provincia == 'Tucumán' %}selected{% endif %}>Tucumán</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Localidad</label>
                        <input type="text" name="localidad" class="form-control" value="{{ alumno.localidad|default:'' }}">
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <div class="col-md-2">
                        <label class="form-label text-muted small fw-bold mb-0">Sexo</label>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="sexo" id="sexoM" value="M" {% if alumno.sexo == 'M' %}checked{% endif %}>
                            <label class="form-check-label" for="sexoM">Masculino</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="sexo" id="sexoF" value="F" {% if alumno.sexo == 'F' %}checked{% endif %}>
                            <label class="form-check-label" for="sexoF">Femenino</label>
                        </div>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="fecha_nacimiento" class="form-label text-muted small fw-bold">Fecha de Nacimiento</label>
                        <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento" value="{{ alumno.fecha_nacimiento|date:'Y-m-d' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">Lugar de Nacimiento</label>
                        <input type="text" name="lugar_nacimiento" class="form-control" value="{{ alumno.lugar_nacimiento|default:'' }}">
                    </div>
                </div>

                <h5 class="text-warning border-bottom pb-2 mb-3 mt-4">2. Datos Académicos</h5>
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="plan" class="form-label fw-bold text-muted small">Plan de Estudio Asignado</label>
                        <select name="plan" id="plan" class="form-select" required>
                            <option value="">Seleccione el plan de estudios...</option>
                            {% for plan in planes %}
                                <option value="{{ plan.id }}" {% if alumno.plan and alumno.plan.id == plan.id %}selected{% endif %}>{{ plan.nombre }} (Res: {{ plan.resolucion_ministerial }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="estado_alumno" class="form-label fw-bold text-muted small">Estado del Alumno *</label>
                        <select name="estado_alumno" id="estado_alumno" class="form-select" required>
                            <option value="ACT" {% if alumno.estado_alumno == 'ACT' %}selected{% endif %}>Activo (Normal)</option>
                            <option value="INA" {% if alumno.estado_alumno == 'INA' %}selected{% endif %}>Inactivo / Abandonó</option>
                            <option value="EGR" {% if alumno.estado_alumno == 'EGR' %}selected{% endif %}>Egresado</option>
                            <option value="COND_DOC" {% if alumno.estado_alumno == 'COND_DOC' %}selected{% endif %}>Condicionado (Falta Documentación)</option>
                            <option value="COND_PAG" {% if alumno.estado_alumno == 'COND_PAG' %}selected{% endif %}>Condicionado (Falta de Pago)</option>
                        </select>
                    </div>
                </div>

                <h5 class="text-warning border-bottom pb-2 mb-3 mt-4">3. Documentación Entregada</h5>
                <div class="row bg-light p-3 rounded">
                    <div class="col-md-4">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" name="doc_dni" id="checkDni" {% if alumno.doc_dni %}checked{% endif %}>
                            <label class="form-check-label" for="checkDni">Fotocopia de DNI</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" name="doc_vacunas" id="checkVacunas" {% if alumno.doc_vacunas %}checked{% endif %}>
                            <label class="form-check-label" for="checkVacunas">Certificado de Vacunas</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" name="doc_partida" id="checkPartida" {% if alumno.doc_partida %}checked{% endif %}>
                            <label class="form-check-label" for="checkPartida">Partida de Nacimiento</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" name="doc_primaria" id="checkPrimaria" {% if alumno.doc_primaria %}checked{% endif %}>
                            <label class="form-check-label" for="checkPrimaria">Título Secundario</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" name="doc_pase" id="checkPase" {% if alumno.doc_pase %}checked{% endif %}>
                            <label class="form-check-label" for="checkPase">Pase Escuela / Terciario Anterior</label>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card-footer bg-white d-flex justify-content-end py-3">
                <button type="submit" class="btn btn-warning px-5 fw-bold text-dark">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
