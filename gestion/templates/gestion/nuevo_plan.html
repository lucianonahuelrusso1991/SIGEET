{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <form method="post" class="card shadow-sm border-0">
            {% csrf_token %}
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0">📚 Nuevo Plan de Estudio</h5>
            </div>
            <div class="card-body p-4">
                <div class="mb-3">
                    <label class="form-label fw-bold text-muted">Nombre del Plan *</label>
                    <input type="text" name="nombre" class="form-control border-dark" placeholder="Ej: Bachiller en Ciencias Sociales" required>
                    <div class="form-text">Este nombre es el que aparecerá en los analíticos y constancias.</div>
                </div>
            </div>
            <div class="card-footer bg-white d-flex justify-content-end py-3 gap-2">
                <a href="{% url 'lista_cursos' %}" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-dark px-4 fw-bold">Crear Plan</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
