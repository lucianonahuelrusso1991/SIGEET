<!-- Chatbot UI Widget -->
<style>
    .chat-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 350px;
        max-height: 500px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        display: none;
        flex-direction: column;
        z-index: 1050;
        border: 1px solid #ddd;
    }
    .chat-header {
        background: #0d6efd;
        color: white;
        padding: 10px 15px;
        border-radius: 12px 12px 0 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
    }
    .chat-body {
        padding: 15px;
        overflow-y: auto;
        height: 300px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .chat-message {
        max-width: 80%;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 0.9rem;
    }
    .msg-user {
        background: #e9ecef;
        align-self: flex-end;
    }
    .msg-bot {
        background: #cff4fc;
        align-self: flex-start;
    }
    .chat-footer {
        padding: 10px;
        border-top: 1px solid #ddd;
        display: flex;
    }
    .btn-chat-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        border-radius: 50%;
        width: 60px;
        height: 60px;
        font-size: 24px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        z-index: 1049;
    }
</style>

<button class="btn btn-primary btn-chat-toggle" onclick="toggleChat()">💬</button>

<div class="chat-container" id="chatContainer">
    <div class="chat-header">
        <span>Asistente IA Secretaría</span>
        <button class="btn-close btn-close-white" onclick="toggleChat()"></button>
    </div>
    <div class="chat-body" id="chatBody">
        <div class="chat-message msg-bot">¡Hola! Soy el asistente virtual. ¿En qué te puedo ayudar con tus fechas de finales o reclamos?</div>
    </div>
    <div class="chat-footer">
        <input type="text" id="chatInput" class="form-control me-2" placeholder="Escribe tu mensaje..." onkeypress="if(event.key === 'Enter') enviarMensaje()">
        <button class="btn btn-primary" onclick="enviarMensaje()">Enviar</button>
    </div>
</div>

<script>
    function toggleChat() {
        const chat = document.getElementById('chatContainer');
        chat.style.display = chat.style.display === 'flex' ? 'none' : 'flex';
    }

    function addMessage(text, type) {
        const chatBody = document.getElementById('chatBody');
        const msgDiv = document.createElement('div');
        msgDiv.className = `chat-message msg-${type}`;
        msgDiv.textContent = text;
        chatBody.appendChild(msgDiv);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    async function enviarMensaje() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if(!text) return;

        addMessage(text, 'user');
        input.value = '';

        // Mostramos "escribiendo..."
        const loadingId = "loading-" + Date.now();
        const chatBody = document.getElementById('chatBody');
        const loadingDiv = document.createElement('div');
        loadingDiv.id = loadingId;
        loadingDiv.className = 'chat-message msg-bot text-muted';
        loadingDiv.textContent = 'Escribiendo...';
        chatBody.appendChild(loadingDiv);
        chatBody.scrollTop = chatBody.scrollHeight;

        try {
            // Reemplaza <alumno_id> con el ID real si el usuario está logueado como alumno
            // Para la demo pasamos un 1 fijo si no sabemos quién es.
            const url = `/api/chatbot/`; 
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ mensaje: text, alumno_id: 1 }) // Hardcodeado a 1 por ahora para testing
            });
            const data = await response.json();
            document.getElementById(loadingId).remove();
            
            if(data.respuesta) {
                addMessage(data.respuesta, 'bot');
            } else {
                addMessage("Hubo un problema de conexión.", 'bot');
            }
        } catch (error) {
            document.getElementById(loadingId).remove();
            addMessage("Error de red. Intenta más tarde.", 'bot');
        }
    }

    // Utilidad para obtener CSRF token en Django
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
