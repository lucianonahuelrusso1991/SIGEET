{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso al Sistema Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .login-bg { background-color: #1F4A75; }
        .btn-custom { background-color: #289EA0; border-color: #289EA0; color: white; }
        .btn-custom:hover { background-color: #1F4A75; border-color: #1F4A75; color: white; }
    </style>
</head>
<body class="login-bg d-flex align-items-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <img src="{% static 'img/logo.png' %}" alt="Profesorado Don Bosco Pío IX" class="img-fluid mb-3" style="max-height: 80px;" onerror="this.src='https://placehold.co/300x80/ffffff/1F4A75?text=Profesorado+Don+Bosco'">
                        <h4 class="fw-bold text-dark">Portal Académico</h4>
                        <p class="text-muted small">Ingresa tus credenciales</p>
                    </div>
                    <form method="post">
                        {% csrf_token %} 
                        {% if form.errors %}
                            <div class="alert alert-danger" role="alert">
                                Usuario o contraseña incorrectos. Por favor, intenta de nuevo.
                            </div>
                        {% endif %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Usuario</label>
                            <input type="text" name="username" class="form-control bg-light" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Contraseña</label>
                            <input type="password" name="password" class="form-control bg-light" required>
                        </div>
                        <button type="submit" class="btn btn-custom w-100 py-2 fw-bold rounded-pill">Ingresar</button>
                    </form>
                </div>
            </div>
            <p class="text-center mt-3 text-white-50"><small>Profesorado Don Bosco Pío IX &copy; 2026</small></p>
        </div>
    </div>
</div>

</body>
</html>
