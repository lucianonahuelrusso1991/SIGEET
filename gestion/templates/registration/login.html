<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso al Sistema Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-primary d-flex align-items-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">¡Hola de nuevo!</h2>
                    <form method="post">
                        {% csrf_token %} 
                        {% if form.errors %}
                            <div class="alert alert-danger" role="alert">
                                Usuario o contraseña incorrectos. Por favor, intenta de nuevo.
                            </div>
                        {% endif %}
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Ingresar</button>
                    </form>
                </div>
            </div>
            <p class="text-center mt-3 text-white-50"><small>Sistema de Gestión Escolar v1.0</small></p>
        </div>
    </div>
</div>

</body>
</html>
