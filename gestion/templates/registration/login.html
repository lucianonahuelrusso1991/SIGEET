{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso al Sistema Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        .btn-custom { background-color: #289EA0; border-color: #289EA0; color: white; }
        .btn-custom:hover { background-color: #1F4A75; border-color: #1F4A75; color: white; }
        
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .hover-lift {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .hover-lift:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
    </style>
</head>
<body class="d-flex align-items-center vh-100" style="background: linear-gradient(135deg, #1F4A75 0%, #289EA0 100%);">

<div class="container fade-in-up">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-lg border-0 rounded-4" style="background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <img src="{% static 'img/logo.png' %}" alt="Profesorado Don Bosco Pío IX" class="img-fluid mb-3" style="max-height: 80px;" onerror="this.src='https://placehold.co/300x80/ffffff/1F4A75?text=Profesorado+Don+Bosco'">
                        <h4 class="fw-bold text-dark mt-2">Portal Académico</h4>
                        <p class="text-muted small">Ingresa tus credenciales</p>
                    </div>
                    <form method="post">
                        {% csrf_token %} 
                        {% if form.errors %}
                            <div class="alert alert-danger" role="alert">
                                Usuario o contraseña incorrectos. Por favor, intenta de nuevo.
                            </div>
                        {% endif %}
                        <div class="form-floating mb-3">
                            <input type="text" name="username" class="form-control rounded-3 bg-light" id="floatingUser" placeholder="Usuario" required>
                            <label for="floatingUser"><i class="bi bi-person text-muted me-2"></i>Usuario</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" name="password" class="form-control rounded-3 bg-light" id="floatingPassword" placeholder="Contraseña" required>
                            <label for="floatingPassword"><i class="bi bi-lock text-muted me-2"></i>Contraseña</label>
                        </div>
                        <button type="submit" class="btn btn-custom w-100 py-3 fw-bold rounded-pill hover-lift shadow-sm">
                            Iniciar Sesión <i class="bi bi-arrow-right-short fs-5 align-middle"></i>
                        </button>
                    </form>
                </div>
            </div>
            <p class="text-center mt-3 text-white-50"><small>SiGeEt &copy; 2026</small></p>
        </div>
    </div>
</div>

</body>
</html>
